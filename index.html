<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的極致浮誇作品集</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+TC:wght@900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffea00, #ff0055);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 5rem;
            color: #fff;
            text-shadow: 5px 5px 0px #ff00ff, 10px 10px 0px #00ffff;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 10px;
            animation: titleFloat 3s ease-in-out infinite;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .container {
            display: flex;
            gap: 30px;
        }

        .btn {
            padding: 25px 50px;
            font-size: 1.8rem;
            font-weight: 900;
            text-decoration: none;
            color: white;
            border: 5px solid white;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: scale(1.2) rotate(5deg);
            background: #fff;
            color: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .btn-2048:hover { border-color: #ff00ff; color: #ff00ff; }
        .btn-ubike:hover { border-color: #00ff00; color: #00ff00; }
        .btn-ai:hover { border-color: #ffff00; color: #ffff00; }

        /* Floating particles background */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <h1 id="main-title">MEGA PROJECTS</h1>

    <div class="container">
        <!-- 連結到您提供的檔案名 -->
        <a href="2048game.html" class="btn btn-2048">🎮 2048 GAME</a>
        <a href="ubikeapp.html" class="btn btn-ubike">🚲 UBIKE APP</a>
        <a href="aistuff.html" class="btn btn-ai">🤖 AI IMAGE EDIT</a>
    </div>

    <div class="particles" id="particles"></div>

    <script>
        // 增加一些動態視覺效果
        const colors = ['#ff00ff', '#00ffff', '#ffea00', '#ff0055', '#00ff00'];
        const particlesContainer = document.getElementById('particles');

        function createParticle() {
            const p = document.createElement('div');
            const size = Math.random() * 50 + 10 + 'px';
            p.style.position = 'absolute';
            p.style.width = size;
            p.style.height = size;
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '110vh';
            p.style.opacity = '0.6';
            p.style.borderRadius = '50%';
            p.style.transition = 'transform 5s linear, opacity 5s';
            
            particlesContainer.appendChild(p);

            setTimeout(() => {
                p.style.transform = `translateY(-120vh) translateX(${Math.random() * 200 - 100}px) rotate(${Math.random() * 360}deg)`;
                p.style.opacity = '0';
            }, 100);

            setTimeout(() => {
                p.remove();
            }, 6000);
        }

        setInterval(createParticle, 300);

        // 按鈕點擊特效
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', (e) => {
                console.log('Navigating to: ' + button.getAttribute('href'));
            });
        });
    </script>
</body>
</html>
