<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超極限浮誇導覽</title>
    <style>
        /* 浮誇背景與動畫 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff00c1, #9600ff, #00fbff, #00ff87);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 容器設計 */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px #fff, 0 0 30px #ff00c1;
            font-size: 2.5rem;
        }

        /* 按鈕基礎樣式 */
        .btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .btn {
            position: relative;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 50px;
            transition: 0.4s;
            overflow: hidden;
            border: none;
            cursor: pointer;
            display: block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* 不同的高飽和度按鈕顏色 */
        .btn-2048 { background: #ff0055; border: 2px solid #ffde00; }
        .btn-youbike { background: #00ffcc; color: #000; border: 2px solid #fff; }
        .btn-untitled { background: #7000ff; border: 2px solid #00fbff; }

        /* 懸停動態效果 */
        .btn:hover {
            transform: scale(1.15) rotate(2deg);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.8);
            letter-spacing: 3px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        /* 點擊特效載體 */
        .click-effect {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 50%;
            animation: ripple 0.6s linear;
        }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 0.5; }
            100% { width: 500px; height: 500px; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>次元門戶導航</h1>
        <div class="btn-wrapper">
            <a href="2048 game.html" class="btn btn-2048">🔥 進入 2048 遊戲 🔥</a>
            <a href="youbike app html" class="btn btn-youbike">🚲 YouBike App 🚲</a>
            <a href="未命名文件(1).html" class="btn btn-untitled">🔮 未命名文件(1) 🔮</a>
        </div>
    </div>

    <script>
        // 加入點擊時的波紋特效
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', function(e) {
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                
                let ripples = document.createElement('span');
                ripples.className = 'click-effect';
                ripples.style.left = x + 'px';
                ripples.style.top = y + 'px';
                this.appendChild(ripples);

                setTimeout(() => {
                    ripples.remove();
                }, 600);
            });
        });

        // 控制台彩蛋
        console.log("%c視覺爆炸！", "color: #ff00c1; font-size: 50px; font-weight: bold; text-shadow: 3px 3px 0 rgb(217,31,38) ;");
    </script>
</body>
</html>
